# Streamlit 主题：温和深色蓝 + 琥珀强调，避免默认红绿过饱和。
[theme]
base = "light"
primaryColor = "#2563EB"           # 主操作按钮：科技蓝
backgroundColor = "#F7F8FA"        # 页面底色：极浅灰，比纯白更稳重
secondaryBackgroundColor = "#FFFFFF"  # 侧栏 / expander 内部
textColor = "#0F172A"              # 深灰蓝，比纯黑柔和
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

# 远程部署相关：cloudflared 隧道在本机连 127.0.0.1:8501，不需要对外暴露端口。
# 关闭 XSRF 是因为通过 Cloudflare Tunnel 反向代理时来源域名会变化。
[server]
headless = true
address = "127.0.0.1"
port = 8501
enableXsrfProtection = false
enableCORS = false
runOnSave = false

