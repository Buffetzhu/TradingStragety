# Streamlit 主题：温和深色蓝 + 琥珀强调，避免默认红绿过饱和。
[theme]
base = "light"
primaryColor = "#2563EB"           # 主操作按钮：科技蓝
backgroundColor = "#F7F8FA"        # 页面底色：极浅灰，比纯白更稳重
secondaryBackgroundColor = "#FFFFFF"  # 侧栏 / expander 内部
textColor = "#0F172A"              # 深灰蓝，比纯黑柔和
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

# 远程访问相关：绑定所有网卡，便于通过 Tailscale 私有网络直接访问。
# 关闭 XSRF/CORS 以兼容 Tailscale 和其他反向代理场景。
[server]
headless = true
address = "0.0.0.0"
port = 8501
enableXsrfProtection = false
enableCORS = false
runOnSave = false

